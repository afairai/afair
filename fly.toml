# Fly app config — single-tenant per Invariant I8.
# This file describes the user's own dedicated machine. When renaming the
# codename: update `app` here, then `fly apps create <new>` + `fly deploy`.

app = "afair"
primary_region = "fra"  # EU residency by default; change deliberately if needed.

[build]
  dockerfile = "Dockerfile"

[env]
  ENVIRONMENT = "fly"
  LOG_LEVEL = "INFO"
  VAULT_DIR = "/data/vault"
  MCP_HOST = "0.0.0.0"
  MCP_PORT = "8080"
  EXTRACTOR_MODEL = "anthropic/claude-haiku-4-5"

# Persistent volume — single-tenant means this disk belongs to one user, forever.
# Created with `fly volumes create vault --region fra --size 1 --snapshot-retention 5`.
# The 5-day automatic snapshots are Fly's built-in defense for Phase 0;
# LiteFS replication arrives in Phase 8.
[mounts]
  source = "vault"
  destination = "/data"

[deploy]
  # `immediate`: stop the existing machine, swap in the new image, restart.
  # Brief downtime (~10-30s) per deploy. The single volume stays mounted on
  # the same machine — no fork, no race, no corruption. True blue/green
  # requires LiteFS (Phase 8); see docs/operations.md "Deploy strategy" for
  # the rationale.
  strategy = "immediate"
  wait_timeout = "5m"

  # release_command runs ONCE per deploy, in the new image, BEFORE the
  # main app process starts. Used here to auto-migrate an existing
  # plaintext vault to the encrypted-at-rest layout (Stufe 1) on the
  # first deploy after AFAIR_VAULT_KEY is set. Idempotent: once the
  # vault is encrypted the script detects that on subsequent runs and
  # exits without touching anything.
  #
  # --skip-backup: we rely on Fly volume snapshots (hourly cron, 14d
  # retention) for the rollback path — no need for the script to
  # duplicate the vault inside the volume.
  release_command = "python scripts/encrypt_existing_vault.py --skip-backup"

[http_service]
  internal_port = 8080
  force_https = true
  # Keep the machine warm — substrate state is local; cold start defeats
  # the latency budget AND `min_machines_running=1` keeps it always-on.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 100
    soft_limit = 50

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    timeout = "5s"
    method = "GET"
    path = "/health"

# Single VM — exactly one machine alive at all times. Per the user's
# instruction "keep one alive, min one alive, kill old on deploy".
[[vm]]
  size = "shared-cpu-1x"
  memory_mb = 1024
  # Bumped 512 → 1024 on 2026-05-25 after backfill OOM'd while embedding
  # a 56KB constitution document. Headroom matters when the warm-path
  # Extractor runs concurrent LLM + embedding calls plus the FastAPI
  # worker and litellm imports (resident set ~150MB at idle).
