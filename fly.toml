# Fly app config — single-tenant per Invariant I8.
# This file describes the user's own dedicated machine.
# When renaming the codename: update `app` here, then `fly apps create <new>` + `fly deploy`.

app = "neverforget"
primary_region = "fra"  # EU residency by default; change deliberately if needed.

[build]
  dockerfile = "Dockerfile"

[env]
  ENVIRONMENT = "fly"
  LOG_LEVEL = "INFO"
  VAULT_DIR = "/data/vault"
  MCP_HOST = "0.0.0.0"
  MCP_PORT = "8080"
  EXTRACTOR_MODEL = "anthropic/claude-haiku-4-5"

# Persistent volume — single-tenant means this disk belongs to one user, forever.
[mounts]
  source = "vault"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  # Keep the machine warm — substrate state is local; cold start defeats the latency budget.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 100
    soft_limit = 50

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    timeout = "5s"
    method = "GET"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory_mb = 512
