name: Release

# On a version tag (vX.Y.Z):
#   1. publish a GitHub Release whose notes come from the matching CHANGELOG.md
#      section — afair keeps hand-written Keep-a-Changelog sections rather than
#      auto-generated commit dumps, so the release reads well;
#   2. trigger the fleet deploy in the private control plane (afair-web), pinned
#      to this exact tag, so the product repo never deploys the operator's
#      infrastructure itself.
#
# trigger-fleet-deploy requires FLEET_DISPATCH_TOKEN (a fine-grained PAT with
# Actions:write on afairai/afair-web).

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # create the GitHub Release

jobs:
  github-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Extract this version's CHANGELOG section
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v v="$VERSION" '
            $0 ~ ("^## \\[" v "\\]") { flag = 1; next }
            flag && (/^## \[/ || /^\[[^]]+\]:/) { exit }
            flag { print }
          ' CHANGELOG.md | sed '/./,$!d' > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            printf 'Release %s. See CHANGELOG.md.\n' "$GITHUB_REF_NAME" > RELEASE_NOTES.md
          fi
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Idempotent: in the normal flow release-please already published
          # this release (and tagged with GITHUB_TOKEN, so this tag-push
          # workflow doesn't even fire). This path is the manual-tag
          # fallback; if a release for the tag already exists, leave it be
          # instead of failing with HTTP 422 "tag_name already exists".
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $GITHUB_REF_NAME already exists — skipping create."
          else
            gh release create "$GITHUB_REF_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$GITHUB_REF_NAME" \
              --notes-file RELEASE_NOTES.md \
              --verify-tag
          fi

  trigger-fleet-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch afair-web fleet deploy (prod) at this tag
        env:
          TOKEN: ${{ secrets.FLEET_DISPATCH_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          echo "Releasing $TAG → afair-web fleet deploy (prod)"
          http=$(curl -sS -o /dev/null -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/afairai/afair-web/actions/workflows/deploy-afair-fleet.yml/dispatches \
            -d "{\"ref\":\"main\",\"inputs\":{\"target\":\"prod\",\"ref\":\"$TAG\"}}")
          echo "dispatch HTTP $http"
          [ "$http" = "204" ] || { echo "dispatch failed"; exit 1; }
