name: Hourly volume snapshot

# RPO upgrade — without this, Fly's automatic snapshots are daily,
# putting our recovery-point-objective at ~24 h. Per docs/operations.md
# §7 this cron tightens the floor to ~1 h. Failure of one run is not
# critical (the next daily snapshot still happens automatically); a
# sustained failure series flags via the workflow-status notification.
#
# Cost: each snapshot is delta-compressed against the volume's existing
# state. For a Phase-0 sub-GB vault the per-snapshot cost is pennies.
#
# Replace the env vault id when the production volume is rebuilt; the
# operations.md §7 runbook documents how to find the current id.

on:
  schedule:
    # Every hour at :17 to avoid clustering with daily snapshots which
    # typically fire on the hour. Cron expr is UTC.
    - cron: "17 * * * *"
  workflow_dispatch:  # manual trigger for one-off snapshots

permissions:
  contents: read

concurrency:
  group: hourly-backup
  cancel-in-progress: false  # let queued runs complete; don't lose snapshots

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      VAULT_VOLUME_ID: vol_4qloyddzwwzzwlgr  # mcp.afair.ai — see ops §7
      VAULT_APP: afair
    steps:
      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Create snapshot
        run: |
          set -euo pipefail
          echo "Triggering snapshot of $VAULT_VOLUME_ID on $VAULT_APP"
          flyctl volumes snapshots create "$VAULT_VOLUME_ID" -a "$VAULT_APP"

      - name: List recent snapshots (visibility)
        if: always()
        run: |
          set -euo pipefail
          flyctl volumes snapshots list "$VAULT_VOLUME_ID" -a "$VAULT_APP" | head -10
