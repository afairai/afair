name: CI

# Product CI for afair: lint, types, tests across supported Python versions,
# lockfile integrity, and a Docker build. No deploy, no secrets, no Fly tokens
# — the operator fleet is deployed from the private afair-web repo. A fork's PR
# runs exactly this.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: test (py${{ matrix.python }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - run: uv python install ${{ matrix.python }}

      # --locked asserts uv.lock is in sync with pyproject.toml (no drift).
      - name: Install dependencies
        run: uv sync --locked --python ${{ matrix.python }}

      - name: Lint
        run: uv run ruff check
      - name: Format check
        run: uv run ruff format --check
      - name: Type check
        run: uv run mypy afair
      - name: Tests + coverage
        run: uv run pytest -q --cov=afair --cov-report=term-missing

  docker:
    name: docker build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      # The fleet deploy builds this image; a PR that breaks the Dockerfile
      # should go red here, before a deploy, not during one.
      - name: Build image (no push)
        run: docker build -t afair:ci .
