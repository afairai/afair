name: Provision user

# Triggered by the afair-web Stripe webhook (checkout.session.completed)
# via the GitHub API. Stands up one paying user's per-user machine end to
# end: provision_user.py builds the Fly app + encrypted vault + vanity host,
# sends the onboarding email (bearer never leaves this job), then calls back
# afair-web /internal/provisioned so the /welcome poll flips to ready.
#
# Inputs are passed through env, NOT interpolated into the shell, so a
# hostile value cannot inject into the run script.

on:
  workflow_dispatch:
    inputs:
      clerk_user_id:
        description: "Clerk userId to provision"
        required: true
        type: string
      email:
        description: "User email (for the onboarding mail)"
        required: true
        type: string

concurrency:
  # Never run two provisions for the same user at once; the provisioner is
  # idempotent but parallel app-creates would race.
  group: provision-${{ inputs.clerk_user_id }}
  cancel-in-progress: false

jobs:
  provision:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - run: uv python install 3.12
      - run: uv sync --frozen

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Provision the user's machine
        env:
          # Org-scoped Fly token: provisioning CREATES new apps, which an
          # app-scoped deploy token cannot do.
          FLY_API_TOKEN: ${{ secrets.FLY_ORG_TOKEN }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          # Shared, fleet-wide secrets each per-user app needs to function.
          IDENTITY_HUB_SECRET: ${{ secrets.IDENTITY_HUB_SECRET }}
          IDENTITY_HUB_URL: ${{ secrets.IDENTITY_HUB_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SENTRY_DSN: ${{ secrets.AFAIR_SENTRY_DSN }}
          EMBEDDING_MODEL: ${{ secrets.EMBEDDING_MODEL }}
          EMBEDDING_DIM: ${{ secrets.EMBEDDING_DIM }}
          # Lets the provisioned machine call afair-web back when an async
          # vault export is ready (machine → /api/internal/export-ready).
          EXPORT_READY_CALLBACK_SECRET: ${{ secrets.EXPORT_READY_CALLBACK_SECRET }}
          # Onboarding email (token stays in this job, never reaches afair-web).
          MAILERSEND_API_TOKEN: ${{ secrets.MAILERSEND_API_TOKEN }}
          MAILERSEND_FROM_EMAIL: ${{ secrets.MAILERSEND_FROM_EMAIL }}
          MAILERSEND_FROM_NAME: afair
          # Callback into afair-web to record fly_app/vanity_host.
          PROVISION_CALLBACK_SECRET: ${{ secrets.PROVISION_CALLBACK_SECRET }}
          PROVISION_CALLBACK_URL: https://afair.ai/api/internal/provisioned
          # Image source: derive the current prod image by digest from here.
          PROVISION_IMAGE_SOURCE_APP: afair-solis-e03
          CLERK_USER_ID: ${{ inputs.clerk_user_id }}
          USER_EMAIL: ${{ inputs.email }}
        run: |
          uv run python scripts/provision_user.py "$CLERK_USER_ID" --email "$USER_EMAIL"
