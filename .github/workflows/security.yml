name: Security

# Two guards that matter for a memory vault going open-source:
#   - dependency CVE audit (pip-audit over the locked deps)
#   - secret scanning (gitleaks) so a credential can never land in the repo
# CodeQL (SAST) is added at the public flip — it's free for public repos.

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "23 6 * * 1" # weekly, Monday 06:23 UTC (catches newly-disclosed CVEs)

permissions:
  contents: read

jobs:
  audit:
    name: dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: uv python install 3.12
      - name: Audit locked dependencies for known CVEs
        run: |
          uv export --format requirements-txt --no-emit-project > requirements.audit.txt
          uvx pip-audit -r requirements.audit.txt

  secrets:
    name: secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # full history so the scan covers every commit
      - name: Install gitleaks
        run: |
          VERSION=8.30.1
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          sudo install gitleaks /usr/local/bin/gitleaks
      - name: Scan for committed secrets
        run: gitleaks detect --source . --no-banner --redact
